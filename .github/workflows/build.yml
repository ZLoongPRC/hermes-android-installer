name: Build & Release
on:
  push:
    branches: [master]
    paths-ignore: ['**.md']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64]

    steps:
      - uses: actions/checkout@v4

      # ── Build Termux APK ──────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          git clone --depth 1 https://github.com/termux/termux-app.git
          cd termux-app
          ./gradlew assembleDebug
          cd ..
          # 只保留 APK
          cp termux-app/app/build/outputs/apk/debug/*.apk termux.apk
          ls -lh termux.apk

      # ── Create installer bundle ───────────────
      - name: Package installer
        run: |
          mkdir -p dist
          # APK
          mv termux.apk "dist/Termux-${{ matrix.arch }}.apk"
          # Setup script（注入架构信息）
          sed "s/ARCH_PLACEHOLDER/${{ matrix.arch }}/g" scripts/setup.sh > dist/setup.sh
          chmod +x dist/setup.sh
          # 压缩为单文件
          cd dist
          tar czf "../Hermes-Android-${{ matrix.arch }}.tar.gz" .
          ls -lh "../Hermes-Android-${{ matrix.arch }}.tar.gz"

      # ── Upload artifact ───────────────────────
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Android-${{ matrix.arch }}
          path: Hermes-Android-${{ matrix.arch }}.tar.gz
          retention-days: 30

      # ── Release ───────────────────────────────
      - name: Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: "Hermes Android v0.1.${{ github.run_number }} (${{ matrix.arch }})"
          body: |
            ## Hermes Android Installer v0.1.${{ github.run_number }}

            - 架构: ${{ matrix.arch }}
            - Termux APK + 一键安装脚本

            ### 安装方法
            1. 装 APK → 2. 打开 Termux → 3. 运行 `bash setup.sh`
          files: Hermes-Android-${{ matrix.arch }}.tar.gz
          generate_release_notes: false
          make_latest: false
