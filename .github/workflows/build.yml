name: Build & Release
on:
  push:
    branches: [master]
    paths-ignore: ['**.md']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64]

    steps:
      - uses: actions/checkout@v4

      # ── Build Termux APK ──────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          git clone --depth 1 https://github.com/termux/termux-app.git
          cd termux-app
          ./gradlew assembleDebug
          cd ..
          # 查找 APK 文件
          APK=$(find termux-app -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" termux.apk
          ls -lh termux.apk

      # ── Create installer bundle ───────────────
      - name: Package installer
        run: |
          mkdir -p dist
          # APK
          mv termux.apk "dist/Termux-${{ matrix.arch }}.apk"
          # Setup script
          cp ../scripts/setup.sh dist/setup.sh || cp scripts/setup.sh dist/setup.sh
          chmod +x dist/setup.sh
          # 压缩为单文件
          cd dist
          tar czf "../Hermes-Android-${{ matrix.arch }}.tar.gz" .
          ls -lh "../Hermes-Android-${{ matrix.arch }}.tar.gz"

      # ── Upload artifact ───────────────────────
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Hermes-Android-${{ matrix.arch }}
          path: Hermes-Android-${{ matrix.arch }}.tar.gz
          retention-days: 90
